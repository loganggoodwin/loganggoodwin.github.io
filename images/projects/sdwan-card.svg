<text x="120" y="355" font-family="JetBrains Mono, monospace" font-size="9" fill="#8fa8c8" text-anchor="middle">Remote office</text>

<!-- SD-WAN fabric center -->
<rect x="280" y="160" width="240" height="80" rx="12" fill="rgba(61,214,245,0.1)" stroke="#3dd6f5" stroke-width="1"/>

<text x="400" y="216" font-family="JetBrains Mono, monospace" font-size="9" fill="#8fa8c8" text-anchor="middle">Dynamic path selection · QoS · failover</text>

<!-- Lines from sites to fabric -->
<line x1="200" y1="120" x2="280" y2="185" stroke="#7ef0c4" stroke-width="1" opacity="0.5"/>
<line x1="200" y1="230" x2="280" y2="200" stroke="#7ef0c4" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 3"/>
<line x1="200" y1="340" x2="280" y2="215" stroke="#7ef0c4" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 3"/>


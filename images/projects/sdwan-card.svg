<text x="40" y="395" font-family="JetBrains Mono, monospace" font-size="10" fill="#e8f1ff" opacity="0.7">Enterprise Network Analysis &amp; SD-WAN Architecture</text>
<text x="40" y="412" font-family="JetBrains Mono, monospace" font-size="9" fill="#8fa8c8" opacity="0.5">SNHU · Multi-site reliability and DR planning</text>

<rect x="580" y="90" width="180" height="50" rx="8" fill="rgba(61,214,245,0.08)" stroke="rgba(61,214,245,0.3)" stroke-width="0.6"/>
<text x="670" y="118" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#3dd6f5" text-anchor="middle">NGFW / IPS</text>

<rect x="580" y="160" width="180" height="50" rx="8" fill="rgba(61,214,245,0.08)" stroke="rgba(61,214,245,0.3)" stroke-width="0.6"/>
<text x="670" y="188" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#3dd6f5" text-anchor="middle">Cloud gateway</text>

<rect x="580" y="230" width="180" height="50" rx="8" fill="rgba(61,214,245,0.08)" stroke="rgba(61,214,245,0.3)" stroke-width="0.6"/>
<text x="670" y="258" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#3dd6f5" text-anchor="middle">DR / failover</text>

<rect x="580" y="300" width="180" height="50" rx="8" fill="rgba(61,214,245,0.08)" stroke="rgba(61,214,245,0.3)" stroke-width="0.6"/>
<text x="670" y="328" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#3dd6f5" text-anchor="middle">SLA monitoring</text>

<!-- Lines from fabric to services -->
<line x1="520" y1="185" x2="580" y2="115" stroke="#3dd6f5" stroke-width="0.7" opacity="0.35"/>
<line x1="520" y1="195" x2="580" y2="185" stroke="#3dd6f5" stroke-width="0.7" opacity="0.35"/>
<line x1="520" y1="205" x2="580" y2="255" stroke="#3dd6f5" stroke-width="0.7" opacity="0.35"/>

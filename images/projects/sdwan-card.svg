<text x="120" y="245" font-family="JetBrains Mono, monospace" font-size="9" fill="#8fa8c8" text-anchor="middle">Remote office</text>

<rect x="40" y="310" width="160" height="60" rx="8" fill="rgba(126,240,196,0.06)" stroke="#7ef0c4" stroke-width="0.6" stroke-dasharray="4 3"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Fayetteville Office Network Design Lab thumbnail</title>
<desc id="desc">Dark themed office network diagram with ISP, firewall, switch, workstations, printer, and collaboration devices.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset=".55" stop-color="#0f172a"/><stop offset="1" stop-color="#064e3b"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6ee7b7"/><stop offset="1" stop-color="#34d399"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter>
</defs>
<rect width="1200" height="675" fill="url(#bg)"/>
<circle cx="180" cy="80" r="230" fill="#34d399" opacity=".12"/>
<circle cx="980" cy="590" r="260" fill="#22c55e" opacity=".10"/>
<g stroke="#34d399" stroke-width="7" stroke-linecap="round" opacity=".72">
  <line x1="600" y1="135" x2="600" y2="235"/>
  <line x1="600" y1="300" x2="600" y2="395"/>
  <line x1="600" y1="455" x2="260" y2="535"/>
  <line x1="600" y1="455" x2="600" y2="535"/>
  <line x1="600" y1="455" x2="940" y2="535"/>
</g>
<g filter="url(#shadow)" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="800" text-anchor="middle">
  <rect x="502" y="60" width="196" height="88" rx="24" fill="#111827" stroke="#6ee7b7" stroke-width="3"/>
  <text x="600" y="112" font-size="34" fill="#d1fae5">ISP</text>
  <rect x="455" y="225" width="290" height="92" rx="24" fill="#111827" stroke="#6ee7b7" stroke-width="3"/>
  <text x="600" y="280" font-size="31" fill="#d1fae5">Firewall / VPN</text>
  <rect x="460" y="385" width="280" height="92" rx="24" fill="#111827" stroke="#6ee7b7" stroke-width="3"/>
  <text x="600" y="440" font-size="33" fill="#d1fae5">Core Switch</text>
  <rect x="130" y="525" width="260" height="86" rx="24" fill="#111827" stroke="#6ee7b7" stroke-width="3"/>
  <text x="260" y="578" font-size="30" fill="#d1fae5">Workstations</text>
  <rect x="475" y="525" width="250" height="86" rx="24" fill="#111827" stroke="#6ee7b7" stroke-width="3"/>
  <text x="600" y="578" font-size="30" fill="#d1fae5">Printer</text>
  <rect x="805" y="525" width="270" height="86" rx="24" fill="#111827" stroke="#6ee7b7" stroke-width="3"/>
  <text x="940" y="578" font-size="30" fill="#d1fae5">Video / Voice</text>
</g>
<g font-family="Inter,Segoe UI,Arial,sans-serif">
  <text x="70" y="95" font-size="34" fill="#f8fafc" font-weight="900">Fayetteville Office</text>
  <text x="70" y="135" font-size="25" fill="#a7f3d0" font-weight="800">Network Design Lab</text>
  <rect x="70" y="178" width="270" height="46" rx="23" fill="url(#accent)" opacity=".95"/>
  <text x="205" y="208" font-size="21" fill="#04111f" text-anchor="middle" font-weight="900">Playable Infrastructure Simulator</text>
  <text x="70" y="275" font-size="22" fill="#cbd5e1">Topology • ISP • Firewall • VPN</text>
  <text x="70" y="309" font-size="22" fill="#cbd5e1">BitLocker • Printing • Scalability</text>
</g>
</svg>

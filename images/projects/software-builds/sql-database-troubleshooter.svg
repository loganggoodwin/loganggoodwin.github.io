<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">SQL Database Troubleshooter project thumbnail</title>
  <desc id="desc">Dark technical card showing a database cylinder, SQL terminal, care meter, and difficulty levels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d1b2e"/>
      <stop offset="1" stop-color="#12243b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="36" fill="url(#bg)"/>
  <circle cx="1015" cy="95" r="210" fill="#5eead4" opacity="0.09"/>
  <circle cx="155" cy="590" r="260" fill="#93c5fd" opacity="0.08"/>

  <rect x="64" y="58" width="1072" height="559" rx="28" fill="rgba(255,255,255,.045)" stroke="rgba(255,255,255,.14)"/>

  <g transform="translate(102 92)">
    <text x="0" y="0" fill="#5eead4" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="800">SQL DATABASE TROUBLESHOOTER</text>
    <text x="0" y="43" fill="#e5edf7" font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800">Database Ops Lab</text>
    <text x="0" y="84" fill="#9fb1c8" font-family="Inter, system-ui, sans-serif" font-size="24">setup · security · troubleshooting · query tuning · backups</text>
  </g>

  <g transform="translate(94 235)">
    <ellipse cx="190" cy="44" rx="150" ry="44" fill="#12243b" stroke="#5eead4" stroke-width="5"/>
    <path d="M40 44v205c0 24 67 44 150 44s150-20 150-44V44" fill="#0d1b2e" stroke="#5eead4" stroke-width="5" opacity=".98"/>
    <ellipse cx="190" cy="249" rx="150" ry="44" fill="#12243b" stroke="#5eead4" stroke-width="5"/>
    <path d="M40 112c0 24 67 44 150 44s150-20 150-44M40 180c0 24 67 44 150 44s150-20 150-44" fill="none" stroke="#93c5fd" stroke-width="3" opacity=".75"/>
    <text x="190" y="62" text-anchor="middle" fill="#e5edf7" font-family="JetBrains Mono, Consolas, monospace" font-size="30" font-weight="800">client_portal</text>
    <text x="190" y="265" text-anchor="middle" fill="#86efac" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="800">HEALTH 100%</text>
  </g>

  <g transform="translate(495 222)">
    <rect x="0" y="0" width="590" height="305" rx="24" fill="#050b14" stroke="rgba(255,255,255,.16)"/>
    <rect x="0" y="0" width="590" height="48" rx="24" fill="rgba(255,255,255,.08)"/>
    <circle cx="28" cy="24" r="7" fill="#fb7185"/><circle cx="52" cy="24" r="7" fill="#fbbf24"/><circle cx="76" cy="24" r="7" fill="#86efac"/>
    <text x="540" y="31" text-anchor="end" fill="#9fb1c8" font-family="JetBrains Mono, Consolas, monospace" font-size="18">simulated-sql-console</text>
    <text x="28" y="92" fill="#93c5fd" font-family="JetBrains Mono, Consolas, monospace" font-size="24">$ CREATE DATABASE client_portal;</text>
    <text x="28" y="133" fill="#86efac" font-family="JetBrains Mono, Consolas, monospace" font-size="24">✓ Database created</text>
    <text x="28" y="174" fill="#93c5fd" font-family="JetBrains Mono, Consolas, monospace" font-size="24">$ GRANT SELECT, INSERT, UPDATE...</text>
    <text x="28" y="215" fill="#86efac" font-family="JetBrains Mono, Consolas, monospace" font-size="24">✓ Least privilege applied</text>
    <text x="28" y="256" fill="#fbbf24" font-family="JetBrains Mono, Consolas, monospace" font-size="24">Mission: tune slow query</text>
  </g>

  <g transform="translate(102 554)">
    <rect x="0" y="0" width="170" height="52" rx="26" fill="rgba(94,234,212,.12)" stroke="rgba(94,234,212,.4)"/>
    <text x="85" y="34" text-anchor="middle" fill="#5eead4" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">EASY</text>
    <rect x="188" y="0" width="190" height="52" rx="26" fill="rgba(147,197,253,.12)" stroke="rgba(147,197,253,.38)"/>
    <text x="283" y="34" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">NORMAL</text>
    <rect x="396" y="0" width="170" height="52" rx="26" fill="rgba(251,191,36,.12)" stroke="rgba(251,191,36,.38)"/>
    <text x="481" y="34" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800">HARD</text>
    <text x="650" y="34" fill="#e5edf7" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">Browser-based SQL command simulation</text>
  </g>
</svg>

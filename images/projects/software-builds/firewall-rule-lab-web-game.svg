<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Firewall Rule Lab playable cybersecurity training game thumbnail</title>
  <desc id="desc">Dark portfolio thumbnail showing firewall rule order, allow and block actions, packet testing, logging, and alert tuning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.50" stop-color="#102033"/>
      <stop offset="1" stop-color="#163a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="44" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#7dd3fc" stroke-width="2">
    <path d="M70 110H1130M70 210H1130M70 310H1130M70 410H1130M70 510H1130"/>
    <path d="M160 65V610M320 65V610M480 65V610M640 65V610M800 65V610M960 65V610"/>
  </g>
  <text x="72" y="86" fill="#ecfeff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="900">Firewall Rule Lab</text>
  <text x="72" y="126" fill="#a7f3d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700">Interactive rule builder • PCAP-style tests • Detection tuning</text>

  <g filter="url(#shadow)">
    <rect x="70" y="174" width="560" height="368" rx="30" fill="#081420" stroke="#38bdf8" stroke-opacity=".45" stroke-width="3"/>
    <rect x="100" y="214" width="500" height="52" rx="16" fill="rgba(14,165,233,.16)" stroke="#38bdf8" stroke-opacity=".42"/>
    <text x="125" y="248" fill="#e0f2fe" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="900">ORDER</text>
    <text x="235" y="248" fill="#e0f2fe" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="900">SOURCE</text>
    <text x="390" y="248" fill="#e0f2fe" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="900">PORT</text>
    <text x="500" y="248" fill="#e0f2fe" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="900">ACTION</text>

    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="800">
      <rect x="100" y="286" width="500" height="54" rx="17" fill="rgba(16,185,129,.14)" stroke="#34d399" stroke-opacity=".48"/>
      <text x="130" y="320" fill="#d1fae5">01</text><text x="235" y="320" fill="#e2e8f0">Staff</text><text x="390" y="320" fill="#bae6fd">443</text><text x="500" y="320" fill="#86efac">ALLOW</text>
      <rect x="100" y="356" width="500" height="54" rx="17" fill="rgba(239,68,68,.12)" stroke="#fb7185" stroke-opacity=".52"/>
      <text x="130" y="390" fill="#fee2e2">02</text><text x="235" y="390" fill="#e2e8f0">Guest</text><text x="390" y="390" fill="#bae6fd">445</text><text x="500" y="390" fill="#fda4af">BLOCK</text>
      <rect x="100" y="426" width="500" height="54" rx="17" fill="rgba(245,158,11,.11)" stroke="#fbbf24" stroke-opacity=".45"/>
      <text x="130" y="460" fill="#fef3c7">03</text><text x="235" y="460" fill="#e2e8f0">VPN</text><text x="390" y="460" fill="#bae6fd">3389</text><text x="500" y="460" fill="#fde68a">LOG</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="178" width="420" height="364" rx="30" fill="#07131f" stroke="url(#accent)" stroke-width="3"/>
    <text x="920" y="230" text-anchor="middle" fill="#e0f2fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="900">Packet Test</text>
    <g filter="url(#glow)" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" fill="none">
      <path d="M775 326H1064"/>
      <path d="M1018 286L1064 326L1018 366"/>
      <circle cx="775" cy="326" r="24" fill="#0f766e" stroke="#5eead4"/>
      <circle cx="1064" cy="326" r="24" fill="#0f766e" stroke="#5eead4"/>
    </g>
    <rect x="760" y="406" width="320" height="54" rx="18" fill="rgba(52,211,153,.14)" stroke="#34d399" stroke-opacity=".52"/>
    <text x="920" y="440" text-anchor="middle" fill="#bbf7d0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="900">PASS: BUSINESS NEED MET</text>
    <rect x="760" y="470" width="320" height="38" rx="19" fill="rgba(15,23,42,.8)" stroke="#38bdf8" stroke-opacity=".35"/>
    <text x="920" y="496" text-anchor="middle" fill="#bae6fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="800">Least privilege • Rule order • Implicit deny</text>
  </g>

  <g transform="translate(72 588)" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="900">
    <rect width="148" height="40" rx="20" fill="rgba(34,197,94,.18)" stroke="#22c55e"/>
    <text x="74" y="27" text-anchor="middle" fill="#bbf7d0" font-size="16">EASY</text>
    <rect x="164" width="148" height="40" rx="20" fill="rgba(34,211,238,.16)" stroke="#22d3ee"/>
    <text x="238" y="27" text-anchor="middle" fill="#bae6fd" font-size="16">NORMAL</text>
    <rect x="328" width="148" height="40" rx="20" fill="rgba(251,191,36,.16)" stroke="#fbbf24"/>
    <text x="402" y="27" text-anchor="middle" fill="#fde68a" font-size="16">HARD</text>
    <rect x="492" width="176" height="40" rx="20" fill="rgba(244,114,182,.14)" stroke="#f472b6"/>
    <text x="580" y="27" text-anchor="middle" fill="#fbcfe8" font-size="16">EXPERT</text>
  </g>
</svg>

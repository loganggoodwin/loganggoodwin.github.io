<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">BusinessNet VLAN Router Lab project thumbnail</title>
  <desc id="desc">A stylized router, firewall, switch, VLAN 10 hardware network, and VLAN 20 phone network diagram.</desc>
  <defs>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cyber Threat Sentinel playable SOC threat detection game thumbnail</title>
  <desc id="desc">Dark cyber operations dashboard showing live alerts, phishing, network traffic, endpoint activity, identity events, and incident response decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.48" stop-color="#0b1f33"/>
      <stop offset="1" stop-color="#123a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="44" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#7dd3fc" stroke-width="2">
    <path d="M68 120H1132M68 240H1132M68 360H1132M68 480H1132M180 60V615M360 60V615M540 60V615M720 60V615M900 60V615M1080 60V615"/>
  </g>
  <text x="70" y="86" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="900">Cyber Threat Sentinel</text>
  <text x="70" y="126" fill="#a7f3d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Real-time SOC decisions • Phishing • Network • Endpoint • Identity</text>

  <g filter="url(#shadow)">
    <rect x="70" y="172" width="660" height="385" rx="30" fill="#071321" stroke="#38bdf8" stroke-opacity=".42" stroke-width="3"/>
    <rect x="104" y="212" width="592" height="58" rx="18" fill="rgba(14,165,233,.16)" stroke="#38bdf8" stroke-opacity=".42"/>
    <text x="130" y="249" fill="#e0f2fe" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="21" font-weight="900">LIVE ALERT QUEUE</text>
    <circle cx="650" cy="241" r="10" fill="#22c55e" filter="url(#glow)"/>
    <text x="590" y="249" fill="#bbf7d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="900">ONLINE</text>

    <g font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="800">
      <rect x="104" y="292" width="592" height="62" rx="18" fill="rgba(244,63,94,.14)" stroke="#fb7185" stroke-opacity=".55"/>
      <text x="130" y="318" fill="#fecdd3" font-size="14">EMAIL GATEWAY</text>
      <text x="130" y="342" fill="#f8fafc" font-size="21">Credential harvest link detected</text>
      <text x="560" y="331" fill="#fecdd3" font-size="18">QUARANTINE</text>

      <rect x="104" y="374" width="592" height="62" rx="18" fill="rgba(251,191,36,.13)" stroke="#fbbf24" stroke-opacity=".55"/>
      <text x="130" y="400" fill="#fde68a" font-size="14">IDENTITY PROVIDER</text>
      <text x="130" y="424" fill="#f8fafc" font-size="21">Brute-force attempts against VPN</text>
      <text x="590" y="413" fill="#fde68a" font-size="18">ESCALATE</text>

      <rect x="104" y="456" width="592" height="62" rx="18" fill="rgba(34,211,238,.12)" stroke="#22d3ee" stroke-opacity=".50"/>
      <text x="130" y="482" fill="#bae6fd" font-size="14">EDR / ENDPOINT</text>
      <text x="130" y="506" fill="#f8fafc" font-size="21">Suspicious PowerShell behavior</text>
      <text x="580" y="495" fill="#bae6fd" font-size="18">ISOLATE</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="780" y="172" width="350" height="385" rx="30" fill="#06111d" stroke="url(#accent)" stroke-width="3"/>
    <text x="955" y="222" text-anchor="middle" fill="#e0f2fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="900">SOC Response</text>
    <circle cx="955" cy="325" r="74" fill="rgba(34,211,238,.10)" stroke="#22d3ee" stroke-width="8"/>
    <path d="M955 276v50l36 24" fill="none" stroke="#34d399" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <text x="955" y="435" text-anchor="middle" fill="#f8fafc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="900">10s RESPONSE WINDOW</text>
    <rect x="835" y="470" width="240" height="44" rx="22" fill="rgba(52,211,153,.15)" stroke="#34d399" stroke-opacity=".55"/>
    <text x="955" y="499" text-anchor="middle" fill="#bbf7d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="900">ALLOW • BLOCK • ESCALATE</text>
  </g>

  <g transform="translate(72 594)" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="900">
    <rect width="146" height="40" rx="20" fill="rgba(34,197,94,.18)" stroke="#22c55e"/>
    <text x="73" y="27" text-anchor="middle" fill="#bbf7d0" font-size="16">EASY</text>
    <rect x="164" width="150" height="40" rx="20" fill="rgba(34,211,238,.16)" stroke="#22d3ee"/>
    <text x="239" y="27" text-anchor="middle" fill="#bae6fd" font-size="16">MEDIUM</text>
    <rect x="332" width="146" height="40" rx="20" fill="rgba(251,191,36,.16)" stroke="#fbbf24"/>
    <text x="405" y="27" text-anchor="middle" fill="#fde68a" font-size="16">HARD</text>
    <rect x="496" width="230" height="40" rx="20" fill="rgba(244,114,182,.14)" stroke="#f472b6"/>
    <text x="611" y="27" text-anchor="middle" fill="#fbcfe8" font-size="16">THREAT DETECTION</text>
  </g>
</svg>

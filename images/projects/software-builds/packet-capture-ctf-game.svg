<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Packet Capture CTF Game playable cybersecurity training thumbnail</title>
  <desc id="desc">Dark cybersecurity training thumbnail showing simulated packet cards, protocol badges, a CTF flag tracker, and packet analysis missions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.48" stop-color="#0c2138"/>
      <stop offset="1" stop-color="#102f47"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="44" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#7dd3fc" stroke-width="2">
    <path d="M72 120H1128M72 230H1128M72 340H1128M72 450H1128M72 560H1128"/>
    <path d="M170 62V612M330 62V612M490 62V612M650 62V612M810 62V612M970 62V612"/>
  </g>
  <text x="70" y="86" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="900">Packet Capture CTF</text>
  <text x="70" y="126" fill="#a7f3d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Simulated packet analysis • Five flags • Easy / Medium / Hard</text>

  <g filter="url(#shadow)">
    <rect x="70" y="168" width="720" height="390" rx="30" fill="#071321" stroke="#38bdf8" stroke-opacity=".45" stroke-width="3"/>
    <rect x="104" y="205" width="652" height="58" rx="18" fill="rgba(14,165,233,.16)" stroke="#38bdf8" stroke-opacity=".42"/>
    <text x="130" y="242" fill="#e0f2fe" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="900">ANALYST PACKET QUEUE</text>
    <text x="650" y="242" fill="#bbf7d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="900">LIVE</text>
    <circle cx="704" cy="234" r="10" fill="#22c55e" filter="url(#glow)"/>

    <g font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="800">
      <rect x="104" y="292" width="300" height="90" rx="18" fill="rgba(57,217,138,.12)" stroke="#34d399" stroke-opacity=".50"/>
      <text x="128" y="322" fill="#bbf7d0" font-size="16">DNS</text>
      <text x="128" y="352" fill="#f8fafc" font-size="19">c2-beacon.darknode</text>
      <text x="128" y="373" fill="#94a3b8" font-size="14">10.0.0.14 → 8.8.8.8 : 53</text>

      <rect x="430" y="292" width="300" height="90" rx="18" fill="rgba(251,191,36,.12)" stroke="#fbbf24" stroke-opacity=".50"/>
      <text x="454" y="322" fill="#fde68a" font-size="16">HTTP</text>
      <text x="454" y="352" fill="#f8fafc" font-size="19">POST /upload payroll.zip</text>
      <text x="454" y="373" fill="#94a3b8" font-size="14">10.0.0.22 → 203.0.113.45</text>

      <rect x="104" y="408" width="300" height="90" rx="18" fill="rgba(167,139,250,.12)" stroke="#a78bfa" stroke-opacity=".50"/>
      <text x="128" y="438" fill="#ddd6fe" font-size="16">TCP</text>
      <text x="128" y="468" fill="#f8fafc" font-size="19">SYN scan 21,22,80,445</text>
      <text x="128" y="489" fill="#94a3b8" font-size="14">10.0.0.88 → 10.0.0.5</text>

      <rect x="430" y="408" width="300" height="90" rx="18" fill="rgba(244,63,94,.12)" stroke="#fb7185" stroke-opacity=".50"/>
      <text x="454" y="438" fill="#fecdd3" font-size="16">SSH</text>
      <text x="454" y="468" fill="#f8fafc" font-size="19">Failed admin/root/test</text>
      <text x="454" y="489" fill="#94a3b8" font-size="14">192.0.2.66 → 10.0.0.10 : 22</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="168" width="300" height="390" rx="30" fill="#06111d" stroke="url(#accent)" stroke-width="3"/>
    <text x="980" y="220" text-anchor="middle" fill="#e0f2fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="900">Flag Tracker</text>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="18" font-weight="900">
      <rect x="875" y="260" width="210" height="42" rx="21" fill="rgba(52,211,153,.16)" stroke="#34d399" stroke-opacity=".55"/>
      <text x="980" y="288" text-anchor="middle" fill="#bbf7d0">FLAG{DNS}</text>
      <rect x="875" y="318" width="210" height="42" rx="21" fill="rgba(56,189,248,.14)" stroke="#38bdf8" stroke-opacity=".55"/>
      <text x="980" y="346" text-anchor="middle" fill="#bae6fd">FLAG{HTTP}</text>
      <rect x="875" y="376" width="210" height="42" rx="21" fill="rgba(167,139,250,.14)" stroke="#a78bfa" stroke-opacity=".55"/>
      <text x="980" y="404" text-anchor="middle" fill="#ddd6fe">FLAG{TCP}</text>
      <rect x="875" y="434" width="210" height="42" rx="21" fill="rgba(251,191,36,.12)" stroke="#fbbf24" stroke-opacity=".55"/>
      <text x="980" y="462" text-anchor="middle" fill="#fde68a">FLAG{ICMP}</text>
      <rect x="875" y="492" width="210" height="42" rx="21" fill="rgba(244,63,94,.12)" stroke="#fb7185" stroke-opacity=".55"/>
      <text x="980" y="520" text-anchor="middle" fill="#fecdd3">FLAG{SSH}</text>
    </g>
  </g>

  <g transform="translate(72 594)" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="900">
    <rect width="146" height="40" rx="20" fill="rgba(34,197,94,.18)" stroke="#22c55e"/>
    <text x="73" y="27" text-anchor="middle" fill="#bbf7d0" font-size="16">EASY</text>
    <rect x="164" width="150" height="40" rx="20" fill="rgba(34,211,238,.16)" stroke="#22d3ee"/>
    <text x="239" y="27" text-anchor="middle" fill="#bae6fd" font-size="16">MEDIUM</text>
    <rect x="332" width="146" height="40" rx="20" fill="rgba(251,191,36,.16)" stroke="#fbbf24"/>
    <text x="405" y="27" text-anchor="middle" fill="#fde68a" font-size="16">HARD</text>
    <rect x="496" width="202" height="40" rx="20" fill="rgba(244,114,182,.14)" stroke="#f472b6"/>
    <text x="597" y="27" text-anchor="middle" fill="#fbcfe8" font-size="16">PACKET ANALYSIS</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Firewall Defender playable cybersecurity learning game thumbnail</title>
  <desc id="desc">Dark cyber-themed project card showing a firewall shield, packet path, ports, protocols, and allow/block rule decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1f2d"/>
      <stop offset="1" stop-color="#102135"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="1" stop-color="#7ef0c4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="46" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="591" rx="34" fill="#081522" stroke="#2fd5f5" stroke-opacity=".32"/>
  <text x="70" y="92" fill="#39e8ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="800" letter-spacing="5">FIREWALL DEFENDER</text>
  <text x="70" y="128" fill="#9fb7ca" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="3">PLAYABLE CYBERSECURITY LEARNING GAME</text>

  <g transform="translate(470 165)" filter="url(#glow)">
    <path d="M130 0 255 44v110c0 113-71 196-125 219C76 350 5 267 5 154V44z" fill="#0b2638" stroke="url(#cyan)" stroke-width="10"/>
    <path d="M130 52 206 79v71c0 67-41 118-76 135-35-17-76-68-76-135V79z" fill="rgba(61,214,245,.12)" stroke="#7ef0c4" stroke-width="5"/>
    <text x="130" y="168" fill="#e8fbff" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="44" font-weight="900">FW</text>
    <text x="130" y="207" fill="#7ef0c4" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="800">DEFAULT DENY</text>
  </g>

  <g fill="none" stroke="#2fd5f5" stroke-width="4" stroke-linecap="round" opacity=".72">
    <path d="M120 265 H420"/>
    <path d="M780 265 H1080"/>
    <path d="M120 398 H420"/>
    <path d="M780 398 H1080"/>
  </g>
  <g fill="#0d2c40" stroke="#2fd5f5" stroke-opacity=".6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="800">
    <rect x="95" y="225" width="210" height="78" rx="20"/>
    <text x="200" y="273" fill="#e8fbff" text-anchor="middle">TCP 443</text>
    <rect x="895" y="225" width="210" height="78" rx="20"/>
    <text x="1000" y="273" fill="#7ef0c4" text-anchor="middle">ALLOW</text>
    <rect x="95" y="358" width="210" height="78" rx="20"/>
    <text x="200" y="406" fill="#e8fbff" text-anchor="middle">TCP 23</text>
    <rect x="895" y="358" width="210" height="78" rx="20"/>
    <text x="1000" y="406" fill="#ff8b8b" text-anchor="middle">BLOCK</text>
  </g>

  <g transform="translate(70 525)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="800">
    <rect x="0" y="0" width="160" height="48" rx="24" fill="#0e3548" stroke="#2fd5f5" stroke-opacity=".45"/>
    <text x="80" y="31" text-anchor="middle" fill="#9deefb" font-size="18">PORTS</text>
    <rect x="180" y="0" width="190" height="48" rx="24" fill="#0e3548" stroke="#2fd5f5" stroke-opacity=".45"/>
    <text x="275" y="31" text-anchor="middle" fill="#9deefb" font-size="18">PROTOCOLS</text>
    <rect x="390" y="0" width="245" height="48" rx="24" fill="#0e3548" stroke="#2fd5f5" stroke-opacity=".45"/>
    <text x="512" y="31" text-anchor="middle" fill="#9deefb" font-size="18">LEAST PRIVILEGE</text>
    <rect x="655" y="0" width="210" height="48" rx="24" fill="#0e3548" stroke="#2fd5f5" stroke-opacity=".45"/>
    <text x="760" y="31" text-anchor="middle" fill="#9deefb" font-size="18">RULE ORDER</text>
    <rect x="885" y="0" width="185" height="48" rx="24" fill="#0e3548" stroke="#2fd5f5" stroke-opacity=".45"/>
    <text x="978" y="31" text-anchor="middle" fill="#9deefb" font-size="18">LEVELS 1–5</text>
  </g>
</svg>

    <path d="M272 344l38 38 84-105" fill="none" stroke="#34d399" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="145" y="552" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#e5f3ff">Security Awareness Lab</text>
    <g transform="translate(565 142)">
